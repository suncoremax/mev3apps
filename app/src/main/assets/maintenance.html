<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>রক্ষণাবেক্ষণ চলছে</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: radial-gradient(circle at 50% 20%, #1c2a10 0%, #060a03 70%, #000 100%);
    font-family: 'Noto Sans Bengali', 'Hind Siliguri', sans-serif;
    color: #eafeea;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    text-align: center;
    padding: 32px 28px;
    max-width: 420px;
    width: 90%;
  }
  .logo {
    width: 96px;
    height: 96px;
    border-radius: 22px;
    box-shadow: 0 0 22px 4px rgba(255, 196, 61, 0.5);
    margin-bottom: 22px;
  }
  .icon-wrap {
    width: 120px;
    height: 120px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,196,61,0.16) 0%, rgba(0,0,0,0) 70%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg { width: 62px; height: 62px; animation: spin 4s linear infinite; transform-origin: center; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 10px;
    text-shadow: 0 0 12px rgba(255,196,61,0.45);
  }
  p {
    font-size: 15px;
    line-height: 1.7;
    color: #d7e8b9;
    margin-bottom: 26px;
  }
  .btn {
    display: inline-block;
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    margin-bottom: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary {
    background: linear-gradient(135deg, #ffd23f, #d69a12);
    color: #2a1c00;
    box-shadow: 0 4px 18px rgba(255, 210, 63, 0.4);
  }
  .btn:active { transform: scale(0.97); }
  .status { margin-top: 18px; font-size: 13px; color: #b8a15a; }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="logo">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17l1 1 5.3-5.3a4 4 0 0 1 5.4-5.4z" stroke="#ffd23f" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M15.5 4.5l2 2M4 20l1-1" stroke="#ffd23f" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>অ্যাপটি রক্ষণাবেক্ষণে আছে</h1>
    <p>এই মুহূর্তে সার্ভার বা লিংকে পৌঁছানো যাচ্ছে না।<br>আমরা কাজ করছি — কিছুক্ষণ পর আবার চেষ্টা করুন।</p>
    <button class="btn btn-primary" onclick="retry()">🔄 আবার চেষ্টা করুন</button>
    <div class="status">সমস্যা চলতে থাকলে অ্যাপ আপডেট করুন অথবা কিছুক্ষণ পর আসুন</div>
  </div>
  <script>
    function retry() {
      try { AndroidBridge.retryLoad(); } catch (e) { location.reload(); }
    }
  </script>
</body>
</html>
