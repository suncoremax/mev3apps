<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ইন্টারনেট সংযোগ নেই</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: radial-gradient(circle at 50% 20%, #163a16 0%, #051005 70%, #000 100%);
    font-family: 'Noto Sans Bengali', 'Hind Siliguri', sans-serif;
    color: #eafeea;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    text-align: center;
    padding: 32px 28px;
    max-width: 420px;
    width: 90%;
  }
  .logo {
    width: 96px;
    height: 96px;
    border-radius: 22px;
    box-shadow: 0 0 22px 4px rgba(102, 255, 102, 0.55);
    margin-bottom: 22px;
  }
  .icon-wrap {
    width: 120px;
    height: 120px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(102,255,102,0.18) 0%, rgba(0,0,0,0) 70%);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.75; }
  }
  svg { width: 64px; height: 64px; }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 10px;
    text-shadow: 0 0 12px rgba(102,255,102,0.5);
  }
  p {
    font-size: 15px;
    line-height: 1.7;
    color: #b9e8b9;
    margin-bottom: 26px;
  }
  .btn {
    display: inline-block;
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    margin-bottom: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary {
    background: linear-gradient(135deg, #39d639, #1f8a1f);
    color: #052605;
    box-shadow: 0 4px 18px rgba(57, 214, 57, 0.45);
  }
  .btn-secondary {
    background: transparent;
    color: #8fe08f;
    border: 1.5px solid rgba(143, 224, 143, 0.5);
  }
  .btn:active { transform: scale(0.97); }
  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #39d639;
    margin: 0 3px;
    animation: blink 1.4s infinite both;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
  .status { margin-top: 18px; font-size: 13px; color: #6fbf6f; }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="logo">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L23 23" stroke="#ff5c5c" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M8.5 16.5C10.4 14.9 13.6 14.9 15.5 16.5" stroke="#39d639" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
        <path d="M5 13C8.9 9.7 15.1 9.7 19 13" stroke="#39d639" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
        <path d="M2 9.5C7.8 4.3 16.2 4.3 22 9.5" stroke="#39d639" stroke-width="1.6" stroke-linecap="round" opacity="0.3"/>
        <circle cx="12" cy="19.2" r="1.3" fill="#39d639"/>
      </svg>
    </div>
    <h1>ইন্টারনেট সংযোগ নেই</h1>
    <p>আপনার মোবাইল ডেটা বা ওয়াইফাই বন্ধ আছে।<br>দয়া করে ইন্টারনেট সংযোগ চালু করে আবার চেষ্টা করুন।</p>
    <button class="btn btn-primary" onclick="retry()">🔄 আবার চেষ্টা করুন</button>
    <button class="btn btn-secondary" onclick="openSettings()">⚙️ সেটিংস খুলুন</button>
    <div class="status"><span class="dots"><span></span><span></span><span></span></span> সংযোগ পরীক্ষা করা হচ্ছে</div>
  </div>
  <script>
    function retry() {
      try { AndroidBridge.retryLoad(); } catch (e) { location.reload(); }
    }
    function openSettings() {
      try { AndroidBridge.openWifiSettings(); } catch (e) {}
    }
    // Auto-retry every 5 seconds in the background
    setInterval(function () {
      try { AndroidBridge.checkAndRetry(); } catch (e) {}
    }, 5000);
  </script>
</body>
</html>
